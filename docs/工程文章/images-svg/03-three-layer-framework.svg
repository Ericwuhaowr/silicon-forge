<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="100%" role="img">
  <title>三层问题×三层解法 工程总结</title>
  <desc>传输层/功能层/安全层：每一层展示问题(红色)→解法(绿色)→工程原则(金色)</desc>
  
  <rect x="0" y="0" width="680" height="320" fill="#FFFFFF"/>
  
  <text x="340" y="26" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">三层问题 × 三层解法 — 工程总结</text>
  
  <rect x="40" y="42" width="600" height="78" rx="8" fill="#F8F9FA" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="40" y="42" width="4" height="78" rx="2" fill="#378ADD"/>
  
  <text x="64" y="65" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#185FA5">传输层</text>
  <line x1="120" y1="58" x2="120" y2="104" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <rect x="130" y="52" width="220" height="26" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="240" y="65" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#791F1F">MCP连接器不稳定</text>
  
  <text x="370" y="65" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#5F5E5A">→</text>
  
  <rect x="390" y="52" width="220" height="26" rx="4" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="500" y="65" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#27500A">IMAP/SMTP独立脚本</text>
  
  <text x="340" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#BA7517">原则: 核心链路不依赖不可控中间件</text>
  
  <rect x="40" y="132" width="600" height="78" rx="8" fill="#F8F9FA" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="40" y="132" width="4" height="78" rx="2" fill="#639922"/>
  
  <text x="64" y="155" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#3B6D11">功能层</text>
  <line x1="120" y1="148" x2="120" y2="194" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <rect x="130" y="142" width="220" height="26" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="240" y="155" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#791F1F">附件无法下载</text>
  
  <text x="370" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#5F5E5A">→</text>
  
  <rect x="390" y="142" width="220" height="26" rx="4" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="500" y="155" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#27500A">mailparser本地解析</text>
  
  <text x="340" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#BA7517">原则: 核心能力自己做，不交给平台</text>
  
  <rect x="40" y="222" width="600" height="78" rx="8" fill="#F8F9FA" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="40" y="222" width="4" height="78" rx="2" fill="#EF9F27"/>
  
  <text x="64" y="245" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#854F0B">安全层</text>
  <line x1="120" y1="238" x2="120" y2="284" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <rect x="130" y="232" width="220" height="26" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="240" y="245" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#791F1F">凭证明文泄露</text>
  
  <text x="370" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#5F5E5A">→</text>
  
  <rect x="390" y="232" width="220" height="26" rx="4" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="500" y="245" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#27500A">系统环境变量</text>
  
  <text x="340" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#BA7517">原则: 凭证不与代码/文档共存</text>
</svg>
