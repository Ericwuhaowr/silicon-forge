<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" width="100%" role="img">
  <title>MCP连接器两阶段静默失败流程图</title>
  <desc>展示WorkBuddy MCP连接器SendMessage的两阶段调用链路：Phase 1返回token→用户确认→Phase 2连接器已回收→静默失败</desc>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <rect x="0" y="0" width="680" height="380" fill="#F1EFE8"/>
  
  <text x="340" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">MCP SendMessage 两阶段调用 — 静默失败链路</text>
  
  <rect x="40" y="48" width="560" height="44" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="320" y="70" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="12" font-weight="500" fill="#185FA5">Phase 1: SendMessage() → 返回 confirmation_token</text>
  
  <line x1="320" y1="92" x2="320" y2="120" stroke="#378ADD" stroke-width="0.5" marker-end="url(#arrow)"/>
  
  <rect x="180" y="125" width="280" height="44" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="320" y="147" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#854F0B">用户点击"确认发送" → 间隔数秒~数分钟</text>
  
  <line x1="320" y1="169" x2="320" y2="197" stroke="#EF9F27" stroke-width="0.5" marker-end="url(#arrow)"/>
  
  <rect x="140" y="202" width="360" height="60" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="320" y="224" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="12" font-weight="500" fill="#993C1D">Phase 2: SendMessage(token) → ⚠ 连接器已unavailable</text>
  <text x="320" y="246" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#712B13">系统进程被回收 · 无报错 · 无超时 · 无日志</text>
  
  <line x1="320" y1="262" x2="320" y2="290" stroke="#D85A30" stroke-width="0.5" marker-end="url(#arrow-red)"/>
  
  <rect x="200" y="295" width="240" height="44" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="320" y="317" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#791F1F">✕ 静默失败 — 邮件未发出</text>
  
  <rect x="140" y="348" width="360" height="24" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="320" y="360" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#A32D2D">失败率约 50% | 零报错 | 仅通过100封测试邮件复现</text>
</svg>
