<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="100%" role="img">
  <title>MCP连接器 vs qq-email SKILL 架构对比</title>
  <desc>左右双栏对比：左侧MCP连接器(旧方案)两阶段异步静默失败 vs 右侧qq-email SKILL(新方案)SMTP一次性同步零失败</desc>
  
  <defs>
    <marker id="arrowL" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
  
  <rect x="0" y="0" width="680" height="420" fill="#F1EFE8"/>
  
  <text x="340" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">MCP连接器 vs qq-email SKILL — 从异步到同步</text>
  
  <rect x="40" y="44" width="290" height="370" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <rect x="350" y="44" width="290" height="370" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  
  <text x="185" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#993C1D">MCP连接器 (旧方案)</text>
  <text x="495" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#0F6E56">qq-email SKILL (新方案)</text>
  
  <rect x="55" y="82" width="260" height="36" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="185" y="100" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#791F1F">平台托管进程</text>
  
  <rect x="365" y="82" width="260" height="36" rx="4" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="495" y="100" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#27500A">独立Node.js进程</text>
  
  <rect x="55" y="128" width="260" height="36" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="185" y="146" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#791F1F">两阶段异步: token→确</text>
  
  <rect x="365" y="128" width="260" height="36" rx="4" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="495" y="146" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#27500A">一次性同步: SMTP直连</text>
  
  <rect x="55" y="174" width="260" height="36" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="185" y="192" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#791F1F">依赖平台生命周期</text>
  
  <rect x="365" y="174" width="260" height="36" rx="4" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="495" y="192" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#27500A">不受平台影响</text>
  
  <rect x="55" y="220" width="260" height="36" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="185" y="238" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#791F1F">附件: 无下载API</text>
  
  <rect x="365" y="220" width="260" height="36" rx="4" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="495" y="238" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#27500A">附件: 直接下载到本地</text>
  
  <rect x="55" y="266" width="260" height="36" rx="4" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="185" y="284" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#791F1F">绿色状态但功能不可用</text>
  
  <rect x="365" y="266" width="260" height="36" rx="4" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="495" y="284" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="11" fill="#27500A">独立进程自管理</text>
  
  <rect x="55" y="320" width="260" height="44" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text x="185" y="336" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#791F1F">失败率 ≈ 50%</text>
  <text x="185" y="352" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#A32D2D">零报错·无日志</text>
  
  <rect x="365" y="320" width="260" height="44" rx="4" fill="#EAF3DE" stroke="#27500A" stroke-width="1"/>
  <text x="495" y="336" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#27500A">失败率 = 0%</text>
  <text x="495" y="352" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="10" fill="#3B6D11">100封测试全通</text>
  
  <line x1="340" y1="80" x2="340" y2="370" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="340" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">异步 → 同步 | 托管 → 独立 | 不可控 → 可控</text>
</svg>
